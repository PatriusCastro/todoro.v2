<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todoro - Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #111111;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      text-align: center;
      max-width: 400px;
    }
    
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    
    h1 {
      font-size: 24px;
      margin-bottom: 12px;
      font-weight: 700;
    }
    
    p {
      color: #888888;
      margin-bottom: 20px;
      line-height: 1.6;
    }
    
    .status {
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      margin: 20px 0;
      font-size: 14px;
      color: #aaaaaa;
    }
    
    .status.online {
      background: rgba(41, 64, 211, 0.1);
      color: #6b9eff;
      display: none;
    }
    
    .button {
      display: inline-block;
      padding: 12px 24px;
      background: #2940D3;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
      text-decoration: none;
    }
    
    .button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📴</div>
    <h1>You're Offline</h1>
    <p>Todoro works offline, but you need an internet connection to load the app for the first time.</p>
    
    <div class="status offline" id="statusOffline">
      ⚪ Waiting for internet connection...
    </div>
    
    <div class="status online" id="statusOnline">
      🟢 You're back online! Reloading...
    </div>
    
    <button class="button" onclick="tryReload()">Try Again</button>
  </div>

  <script>
    function tryReload() {
      window.location.href = '/';
    }
    
    // Listen for online event
    window.addEventListener('online', () => {
      document.getElementById('statusOnline').style.display = 'block';
      document.getElementById('statusOffline').style.display = 'none';
      setTimeout(tryReload, 1500);
    });
    
    window.addEventListener('offline', () => {
      document.getElementById('statusOnline').style.display = 'none';
      document.getElementById('statusOffline').style.display = 'block';
    });
    
    // Check if online on load
    if (navigator.onLine) {
      tryReload();
    }
  </script>
</body>
</html>
